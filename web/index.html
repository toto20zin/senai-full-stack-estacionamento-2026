<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estacionamento ACME</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
</head>

<body>

    <header>

        <img width="70" id="logo"
            src="https://cdn-icons-png.flaticon.com/512/744/744465.png">

        <h1>Estacionamento ACME</h1>

        <div class="pesquisa">

            <input type="text"
                id="buscarPlaca"
                placeholder="Pesquisar placa">

            <button onclick="pesquisarVeiculo()">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>

            <button onclick="carregarVeiculos()">
                Mostrar todos
            </button>

        </div>

        <div class="botoes">

            <button onclick="cadastro.classList.remove('oculto')">
                Cadastrar veículo
            </button>

            <a href="estadia.html">

                <button>
                    Ver Estadias
                </button>

            </a>

        </div>

    </header>

    <main id="cards"></main>

    <div id="cadastro" class="modal oculto">

        <div class="janela">

            <h2>Cadastrar Veículo</h2>

            <form id="formCad">

                <label>Placa</label>
                <input type="text" id="placa" required>

                <label>Proprietário</label>
                <input type="text" id="proprietario" required>

                <label>Modelo</label>
                <input type="text" id="modelo" required>

                <label>Tipo</label>

                <select id="tipo" required>

                    <option value="">Selecione...</option>
                    <option value="Carro">Carro</option>
                    <option value="Moto">Moto</option>
                    <option value="Caminhonete">Caminhonete</option>

                </select>

                <label>Marca</label>
                <input type="text" id="marca" required>

                <label>Cor</label>
                <input type="text" id="cor">

                <label>Ano</label>
                <input type="number" id="ano">

                <label>Telefone</label>
                <input type="text" id="telefone">

                <br><br>

                <button type="reset"
                    onclick="cadastro.classList.add('oculto')">

                    Cancelar

                </button>

                <button type="submit">

                    Salvar

                </button>

            </form>

        </div>

    </div>

    <div id="detalhes" class="modal oculto">

        <div class="janela">

            <h2 id="tituloVeiculo"></h2>

            <p><b>Placa</b></p>
            <input type="text" id="placaEdit" disabled>

            <p><b>Proprietário</b></p>
            <input type="text" id="proprietarioEdit">

            <p><b>Modelo</b></p>
            <input type="text" id="modeloEdit">

            <p><b>Tipo</b></p>

            <select id="tipoEdit">

                <option value="Carro">Carro</option>
                <option value="Moto">Moto</option>
                <option value="Caminhonete">Caminhonete</option>

            </select>

            <p><b>Marca</b></p>
            <input type="text" id="marcaEdit">

            <p><b>Cor</b></p>
            <input type="text" id="corEdit">

            <p><b>Ano</b></p>
            <input type="number" id="anoEdit">

            <p><b>Telefone</b></p>
            <input type="text" id="telefoneEdit">

            <br><br>

            <button onclick="salvarEdicao()">

                Salvar

            </button>

            <button onclick="excluirVeiculoAtual()">

                Excluir

            </button>

            <button onclick="detalhes.classList.add('oculto')">

                Fechar

            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
